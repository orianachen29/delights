<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delights - 美味便當線上預購與查詢</title>
    <!-- 引入 Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #e67e22;
            --secondary-color: #2c3e50;
            --bg-color: #f4f6f7;
            --danger-color: #e74c3c;
            --card-bg: #ffffff;
            --success-color: #2ecc71;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 20px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .header-title {
            text-align: center;
            color: var(--secondary-color);
            margin: 0 0 10px 0;
            font-size: 22px;
        }

        /* 頁籤切換 (預購 vs 查詢) */
        .tab-menu {
            display: flex;
            border-bottom: 2px solid #e2e8f0;
            margin-bottom: 15px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: none;
            border: none;
            font-size: 15px;
            font-weight: bold;
            color: #718096;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: 0.2s;
        }
        .tab-btn.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .notice-box {
            background-color: #fff5f5;
            border-left: 4px solid var(--danger-color);
            padding: 8px 12px;
            margin-bottom: 15px;
            border-radius: 4px;
            font-size: 12px;
            color: #c0392b;
            line-height: 1.4;
        }

        /* 表單區域布局 */
        .form-section {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 4px;
            color: var(--secondary-color);
        }
        input[type="text"], input[type="tel"], select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        /* 便當網格 */
        .section-title {
            font-size: 15px;
            font-weight: bold;
            color: var(--secondary-color);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 4px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .bento-card {
            background: #fafafa;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .bento-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .bento-name { font-size: 15px; font-weight: bold; }
        .bento-price { color: var(--danger-color); font-size: 13px; font-weight: bold; }

        .qty-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
        }
        .btn-qty {
            background: #edf2f7;
            border: none;
            width: 30px;
            height: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .qty-input {
            width: 100%;
            text-align: center;
            border: none;
            font-size: 14px;
            font-weight: bold;
        }

        .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafc;
            padding: 12px 18px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        .total-price { color: var(--danger-color); font-size: 20px; font-weight: bold; }
        .submit-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }

        /* 查詢區塊樣式 */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn-search {
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        .order-card {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            background: #fafafa;
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 8px;
            margin-bottom: 8px;
        }
        .order-sn { font-weight: bold; color: var(--primary-color); }
        .badge {
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-pending { background: #fef9e7; color: #f39c12; }
        .badge-completed { background: #e8f8f5; color: #2ecc71; }
        .badge-cancelled { background: #fadbd8; color: #e74c3c; }

        @media (max-width: 640px) {
            .form-section, .menu-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2 class="header-title">🍱 Delights 美味便當系統</h2>

    <!-- 頂部頁籤切換 -->
    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('orderTab')">✍️ 線上預購</button>
        <button class="tab-btn" onclick="switchTab('searchTab')">🔍 訂單查詢</button>
    </div>

    <!-- 頁籤一：線上預購 -->
    <div id="orderTab" class="tab-content active">
        <div class="notice-box">
            ⚠️ <strong>訂購須知：</strong>均一價 $120 元。採精準食材準備，【取貨前 3 天】恕不接受取消或修改。急單或需刪單修改請洽專線：403-6734。
        </div>

        <form id="orderForm" novalidate>
            <div class="form-section">
                <div class="form-group">
                    <label for="deptCode">部門代號 *</label>
                    <input type="text" id="deptCode" maxlength="5" placeholder="5碼 (如: RD102)" oninput="this.value = this.value.toUpperCase()">
                </div>

                <div class="form-group">
                    <label for="name">訂購人姓名 *</label>
                    <input type="text" id="name" maxlength="4" placeholder="中文至多4碼">
                </div>

                <div class="form-group">
                    <label for="phone">手機電話 *</label>
                    <input type="tel" id="phone" maxlength="10" placeholder="數字10碼">
                </div>

                <div class="form-group">
                    <label for="pickupTime">取貨時間 *</label>
                    <select id="pickupTime">
                        <option value="" disabled selected>請選擇時間</option>
                        <option value="11:30">11:30</option>
                        <option value="12:30">12:30</option>
                    </select>
                </div>

                <div class="form-group" style="grid-column: span 4;">
                    <label for="orderDay">取貨日期 *</label>
                    <select id="orderDay">
                        <option value="" disabled selected>請選擇日期</option>
                    </select>
                </div>
            </div>

            <div class="section-title">
                <span>便當款式選擇</span>
                <span style="font-size:12px; color:#718096; font-weight:normal;">(可點選 +/- 或直接手動輸入數量)</span>
            </div>
            <div id="bentoMenu" class="menu-grid"></div>

            <div class="bottom-bar">
                <div style="font-size:16px; font-weight:bold;">
                    總計金額：<span class="total-price" id="totalPrice">$0</span>
                </div>
                <button type="submit" id="submitBtn" class="submit-btn">確認提交預購單</button>
            </div>
        </form>
    </div>

    <!-- 頁籤二：訂單查詢（僅供檢視，無法刪單） -->
    <div id="searchTab" class="tab-content">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="請輸入『手機號碼』或『訂單流水號』..." style="flex:1;">
            <button class="btn-search" onclick="searchOrders()">查詢訂單</button>
        </div>
        <div id="searchResults">
            <p style="text-align:center; color:#718096;">請輸入手機號碼或流水號進行查詢。</p>
        </div>
    </div>
</div>

<script>
    // 1. 初始化 Supabase
    const SUPABASE_URL = 'https://yoqlmjbcwoezpxsdpshw.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvcWxtamJjd29lenB4c2Rwc2h3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3MDIzMzcsImV4cCI6MjEwMDI3ODMzN30.Hw_IFftReBMOKsR1c9zsTarIc8RslTF_pg2FIuV1i1o';
    
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const bentos = ["滷腿庫", "花瓜嫩雞", "三杯雞", "烤腿排", "照燒雞", "蔥爆肉絲", "洋蔥雞丁", "瓜仔肉", "芝麻燒肉"];
    const PRICE_PER_BENTO = 120;

    // 頁籤切換
    function switchTab(tabId) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        
        if(tabId === 'orderTab') {
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
        } else {
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
        }
        document.getElementById(tabId).classList.add('active');
    }

    // 產生專屬流水號 (格式：DL + 年月日 + 4位隨機碼，如 DL20260722-A8F2)
    function generateOrderSN() {
        const date = new Date();
        const yyyy = date.getFullYear();
        const mm = String(date.getMonth() + 1).padStart(2, '0');
        const dd = String(date.getDate()).padStart(2, '0');
        const randomCode = Math.random().toString(36).substring(2, 6).toUpperCase();
        return `DL${yyyy}${mm}${dd}-${randomCode}`;
    }

    // 渲染便當卡片
    const menuContainer = document.getElementById('bentoMenu');
    bentos.forEach((bento, index) => {
        const card = document.createElement('div');
        card.className = 'bento-card';
        card.innerHTML = `
            <div class="bento-info">
                <span class="bento-name">${bento}</span>
                <span class="bento-price">$${PRICE_PER_BENTO}</span>
            </div>
            <div class="qty-control">
                <button type="button" class="btn-qty" onclick="changeQty(${index}, -1)">-</button>
                <input type="text" class="qty-input" id="qty-${index}" value="0" oninput="validateQtyInput(this)" onblur="formatQtyInput(this)">
                <button type="button" class="btn-qty" onclick="changeQty(${index}, 1)">+</button>
            </div>
        `;
        menuContainer.appendChild(card);
    });

    // 渲染取貨日期選單
    function initDatePicker() {
        const daySelect = document.getElementById('orderDay');
        const currentDate = new Date();
        const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
        const targetDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 2, 0);
        
        let iterDate = new Date(currentDate);
        while (iterDate <= targetDate) {
            const y = iterDate.getFullYear();
            const m = iterDate.getMonth() + 1;
            const d = iterDate.getDate();
            const w = weekDays[iterDate.getDay()];
            
            const opt = document.createElement('option');
            opt.value = `${y}年${m}月${d}日(週${w})`;
            opt.innerText = `${m}月${d}日 (週${w})`;
            daySelect.appendChild(opt);
            iterDate.setDate(iterDate.getDate() + 1);
        }
    }
    initDatePicker();

    function changeQty(index, change) {
        const qtyInput = document.getElementById(`qty-${index}`);
        let currentQty = parseInt(qtyInput.value) || 0;
        currentQty += change;
        if (currentQty < 0) currentQty = 0;
        qtyInput.value = currentQty;
        calculateTotal();
    }

    function validateQtyInput(input) {
        input.value = input.value.replace(/[^0-9]/g, '');
        calculateTotal();
    }

    function formatQtyInput(input) {
        if (input.value === '' || parseInt(input.value) < 0) input.value = '0';
        else input.value = parseInt(input.value).toString();
        calculateTotal();
    }

    function calculateTotal() {
        let totalItems = 0;
        bentos.forEach((_, index) => {
            totalItems += parseInt(document.getElementById(`qty-${index}`).value) || 0;
        });
        document.getElementById('totalPrice').innerText = `$${(totalItems * PRICE_PER_BENTO).toLocaleString()}`;
    }

    function validateForm() {
        const deptCode = document.getElementById('deptCode').value.trim();
        const name = document.getElementById('name').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const orderDay = document.getElementById('orderDay').value;
        const pickupTime = document.getElementById('pickupTime').value;

        if (!/^[a-zA-Z0-9]{5}$/.test(deptCode)) {
            alert("❌ 欄位格式錯誤：部門代號限定5碼(英文或數字)");
            return false;
        }
        if (!/^[\u4e00-\u9fa5]{1,4}$/.test(name)) {
            alert("❌ 欄位格式錯誤：訂購人姓名為中文，至多4碼");
            return false;
        }
        if (!/^\d{10}$/.test(phone)) {
            alert("❌ 欄位格式錯誤：手機電話限數字10碼");
            return false;
        }
        if (!orderDay || !pickupTime) {
            alert("❌ 請選擇正確的取貨日期與取貨時間！");
            return false;
        }
        return true;
    }

    // 提交預購單
    document.getElementById('orderForm').addEventListener('submit', async function(event) {
        event.preventDefault();
        if (!validateForm()) return;

        const deptCode = document.getElementById('deptCode').value.toUpperCase().trim();
        const name = document.getElementById('name').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const orderDay = document.getElementById('orderDay').value;
        const pickupTime = document.getElementById('pickupTime').value;

        let orderItems = [];
        let totalItems = 0;
        let summaryDetails = "";

        bentos.forEach((bento, index) => {
            const qty = parseInt(document.getElementById(`qty-${index}`).value) || 0;
            if (qty > 0) {
                orderItems.push({ bento_name: bento, quantity: qty });
                totalItems += qty;
                summaryDetails += `• ${bento} × ${qty} 個\n`;
            }
        });

        if (totalItems === 0) {
            alert("⚠️ 請至少選擇一個便當唷！");
            return;
        }

        const totalPrice = totalItems * PRICE_PER_BENTO;
        const orderSN = generateOrderSN();

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = "寫入訂單中...";

        try {
            // 寫入 orders
            const { data: orderData, error: orderError } = await supabaseClient
                .from('orders')
                .insert([{
                    order_sn: orderSN,
                    order_day: orderDay,
                    pickup_time: pickupTime,
                    dept_code: deptCode,
                    name: name,
                    phone: phone,
                    total_price: totalPrice,
                    status: 'pending'
                }])
                .select();

            if (orderError) throw new Error("Orders 寫入失敗：" + orderError.message);

            const newOrderId = orderData[0].id;

            // 寫入 order_items
            const itemRecords = orderItems.map(item => ({
                order_id: newOrderId,
                bento_name: item.bento_name,
                quantity: item.quantity
            }));

            const { error: itemsError } = await supabaseClient
                .from('order_items')
                .insert(itemRecords);

            if (itemsError) throw new Error("Order_items 寫入失敗：" + itemsError.message);

            alert(
                `🎉 訂單送單成功！\n\n` +
                `【訂單流水編號】：${orderSN}\n` +
                `(提示：您可憑此流水號或手機號碼至「訂單查詢」查看狀態；如需修改或刪單請洽後台管理員)\n\n` +
                `訂購人：${name} (${deptCode})\n` +
                `取貨時間：${orderDay} ${pickupTime}\n` +
                `-----------------------------\n` +
                `【訂購品項】\n${summaryDetails}` +
                `-----------------------------\n` +
                `總金額：$${totalPrice} 元`
            );
            location.reload();

        } catch (err) {
            alert("❌ 送單失敗：" + err.message);
            submitBtn.disabled = false;
            submitBtn.innerText = "確認提交預購單";
        }
    });

    // 訂單查詢功能 (純檢視，不包含任何刪除與修改權限)
    async function searchOrders() {
        const query = document.getElementById('searchInput').value.trim();
        const resultsDiv = document.getElementById('searchResults');

        if (!query) {
            alert("請輸入手機號碼或流水號進行查詢！");
            return;
        }

        resultsDiv.innerHTML = '<p style="text-align:center; color:#718096;">查詢中，請稍候...</p>';

        try {
            const { data: orders, error } = await supabaseClient
                .from('orders')
                .select(`*, order_items (bento_name, quantity)`)
                .or(`phone.eq.${query},order_sn.eq.${query}`)
                .order('created_at', { ascending: false });

            if (error) throw error;

            if (!orders || orders.length === 0) {
                resultsDiv.innerHTML = '<p style="text-align:center; color:#e74c3c;">查無相關訂單資料，請確認輸入是否正確。</p>';
                return;
            }

            let html = '';
            orders.forEach(o => {
                let badgeClass = 'badge-pending';
                let statusText = '待處理';
                if(o.status === 'completed') { badgeClass = 'badge-completed'; statusText = '已完成'; }
                if(o.status === 'cancelled') { badgeClass = 'badge-cancelled'; statusText = '已取消'; }

                let itemsText = '';
                if (o.order_items) {
                    o.order_items.forEach(item => {
                        itemsText += `<div>• ${item.bento_name} × ${item.quantity}</div>`;
                    });
                }

                html += `
                    <div class="order-card">
                        <div class="order-header">
                            <span class="order-sn">流水號：${o.order_sn || '無流水號'}</span>
                            <span class="badge ${badgeClass}">${statusText}</span>
                        </div>
                        <div style="font-size:14px; line-height:1.6;">
                            <div><strong>取貨時間：</strong>${o.order_day} ${o.pickup_time}</div>
                            <div><strong>訂購人：</strong>[${o.dept_code}] ${o.name} (${o.phone})</div>
                            <div style="margin-top:5px; background:#fff; padding:8px; border-radius:4px; border:1px solid #edf2f7;">${itemsText}</div>
                            <div style="text-align:right; font-weight:bold; color:#e74c3c; margin-top:5px;">總金額：$${o.total_price}</div>
                        </div>
                    </div>
                `;
            });
            resultsDiv.innerHTML = html;

        } catch (err) {
            resultsDiv.innerHTML = `<p style="text-align:center; color:#e74c3c;">查詢失敗：${err.message}</p>`;
        }
    }
</script>
</body>
</html>
