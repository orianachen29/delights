<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美味便當線上預購系統</title>
    <!-- 引入 Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #e67e22;
            --secondary-color: #2c3e50;
            --bg-color: #f9f9f9;
            --danger-color: #e74c3c;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: var(--secondary-color);
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 20px;
            font-size: 1.1em;
        }
        .notice-box {
            background-color: #fff5f5;
            border-left: 4px solid var(--danger-color);
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 4px;
        }
        .notice-box p {
            margin: 0;
            color: #c0392b;
            font-weight: bold;
            font-size: 14px;
            line-height: 1.6;
        }
        .form-row {
            display: flex;
            gap: 15px;
        }
        .form-group {
            margin-bottom: 20px;
            flex: 1;
        }
        .form-group.full-width {
            flex: none;
            width: 100%;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--secondary-color);
        }
        input[type="text"], input[type="tel"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .menu-title {
            font-size: 1.2em;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 5px;
            margin-top: 30px;
            margin-bottom: 15px;
            color: var(--secondary-color);
        }
        .bento-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .bento-name {
            font-size: 16px;
            font-weight: 500;
        }
        .bento-price {
            color: var(--danger-color);
            font-size: 14px;
            margin-left: 5px;
        }
        .quantity-selector {
            display: flex;
            align-items: center;
        }
        .btn-qty {
            background: #eee;
            border: none;
            width: 32px;
            height: 32px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }
        .btn-qty:hover { background: #ddd; }
        .qty-input {
            width: 40px;
            text-align: center;
            border: none;
            font-size: 16px;
            font-weight: bold;
        }
        .total-section {
            background: #edf2f7;
            padding: 15px;
            border-radius: 6px;
            margin-top: 25px;
            text-align: right;
            font-size: 1.2em;
            font-weight: bold;
        }
        .total-price {
            color: var(--danger-color);
            font-size: 1.4em;
        }
        .submit-btn {
            display: block;
            width: 100%;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 25px;
            transition: 0.3s;
        }
        .submit-btn:hover { background: #d35400; }
        .submit-btn:disabled { background: #95a5a6; cursor: not-allowed; }
    </style>
</head>
<body>
<div class="container">
    <h1>🍱 每日精選便當預購</h1>
    <div class="subtitle">均一價 120 元 | 請於指定時間取餐</div>

    <div class="notice-box">
        <p>⚠️ 訂購須知：</p>
        <p>1. 本營運採精準食材準備，【取貨前 3 天（含取貨當日）】恕不接受取消或修改訂單。</p>
        <p>2. 若需於【取貨前三天之前】取消訂單，請洽 Team Pro 專人辦理（專線：403-6734）。</p>
    </div>

    <form id="orderForm">
        <div class="form-group full-width">
            <label for="deptCode">部門代號 * (限5碼，如：RD102)</label>
            <input type="text" id="deptCode" required maxlength="5" pattern="^[a-zA-Z0-9]{5}$" placeholder="請輸入5碼部門代號" title="請輸入剛好5碼的英文或數字" oninput="this.value = this.value.toUpperCase()">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="name">訂購人姓名 *</label>
                <input type="text" id="name" required placeholder="請輸入您的姓名">
            </div>

            <div class="form-group">
                <label for="phone">手機號碼 *</label>
                <input type="tel" id="phone" required pattern="09\d{8}" placeholder="如：0912345678" title="請輸入正確的手機號碼格式（共10碼）">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group" style="flex: 2;">
                <label for="orderDay">取貨日期 *</label>
                <select id="orderDay" required>
                    <option value="" disabled selected>請選擇日期</option>
                </select>
            </div>

            <div class="form-group" style="flex: 1;">
                <label for="pickupTime">取貨時間 *</label>
                <select id="pickupTime" required>
                    <option value="" disabled selected>請選擇時間</option>
                    <option value="11:30">11:30</option>
                    <option value="12:30">12:30</option>
                </select>
            </div>
        </div>

        <div class="menu-title">便當款式選擇 (每個 $120)</div>
        <div id="bentoMenu"></div>

        <div class="total-section">
            總計金額： <span class="total-price" id="totalPrice">$0</span>
        </div>

        <button type="submit" id="submitBtn" class="submit-btn">確認提交預購單</button>
    </form>
</div>

<script>
    // 1. 初始化 Supabase
    const SUPABASE_URL = 'https://yoqlmjbcwoezpxsdpshw.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvcWxtamJjd29lenB4c2Rwc2h3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3MDIzMzcsImV4cCI6MjEwMDI3ODMzN30.Hw_IFftReBMOKsR1c9zsTarIc8RslTF_pg2FIuV1i1o';
    
    // 使用全域 window.supabase 確保不衝突
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const bentos = [
        "滷腿庫", "花瓜嫩雞", "三杯雞", "烤腿排", "照燒雞", 
        "蔥爆肉絲", "洋蔥雞丁", "瓜仔肉", "芝麻燒肉"
    ];
    const PRICE_PER_BENTO = 120;

    // 渲染便當清單
    const menuContainer = document.getElementById('bentoMenu');
    bentos.forEach((bento, index) => {
        const itemDiv = document.createElement('div');
        itemDiv.className = 'bento-item';
        itemDiv.innerHTML = `
            <div>
                <span class="bento-name">${bento}</span>
                <span class="bento-price">$${PRICE_PER_BENTO}</span>
            </div>
            <div class="quantity-selector">
                <button type="button" class="btn-qty" onclick="changeQty(${index}, -1)">-</button>
                <input type="text" class="qty-input" id="qty-${index}" value="0" readonly>
                <button type="button" class="btn-qty" onclick="changeQty(${index}, 1)">+</button>
            </div>
        `;
        menuContainer.appendChild(itemDiv);
    });

    // 渲染日期選擇器
    function initDatePicker() {
        const daySelect = document.getElementById('orderDay');
        const currentDate = new Date();
        const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
        const targetDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 2, 0);
        
        let iterDate = new Date(currentDate);
        while (iterDate <= targetDate) {
            const y = iterDate.getFullYear();
            const m = iterDate.getMonth() + 1;
            const d = iterDate.getDate();
            const w = weekDays[iterDate.getDay()];
            
            const opt = document.createElement('option');
            opt.value = `${y}年${m}月${d}日(週${w})`;
            opt.innerText = `${m}月${d}日 (週${w})`;
            daySelect.appendChild(opt);
            iterDate.setDate(iterDate.getDate() + 1);
        }
    }
    initDatePicker();

    function changeQty(index, change) {
        const qtyInput = document.getElementById(`qty-${index}`);
        let currentQty = parseInt(qtyInput.value) || 0;
        currentQty += change;
        if (currentQty < 0) currentQty = 0;
        qtyInput.value = currentQty;
        calculateTotal();
    }

    function calculateTotal() {
        let totalItems = 0;
        bentos.forEach((_, index) => {
            totalItems += parseInt(document.getElementById(`qty-${index}`).value) || 0;
        });
        const totalMoney = totalItems * PRICE_PER_BENTO;
        document.getElementById('totalPrice').innerText = `$${totalMoney}`;
    }

    // 表單監聽事件
    document.getElementById('orderForm').addEventListener('submit', async function(event) {
        event.preventDefault();

        const submitBtn = document.getElementById('submitBtn');
        const deptCode = document.getElementById('deptCode').value.toUpperCase();
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const orderDay = document.getElementById('orderDay').value;
        const pickupTime = document.getElementById('pickupTime').value;

        let orderItems = [];
        let totalItems = 0;

        bentos.forEach((bento, index) => {
            const qty = parseInt(document.getElementById(`qty-${index}`).value) || 0;
            if (qty > 0) {
                orderItems.push({ bento_name: bento, quantity: qty });
                totalItems += qty;
            }
        });

        if (totalItems === 0) {
            alert("⚠️ 請至少選擇一個便當唷！");
            return;
        }

        const totalPrice = totalItems * PRICE_PER_BENTO;

        // 鎖定按鈕
        submitBtn.disabled = true;
        submitBtn.innerText = "資料連線中，請稍候...";

        try {
            // 1. 寫入 orders 表
            const { data: orderData, error: orderError } = await supabaseClient
                .from('orders')
                .insert([{
                    order_day: orderDay,
                    pickup_time: pickupTime,
                    dept_code: deptCode,
                    name: name,
                    phone: phone,
                    total_price: totalPrice,
                    status: 'pending'
                }])
                .select();

            if (orderError) throw new Error("寫入 orders 失敗：" + orderError.message);

            const newOrderId = orderData[0].id;

            // 2. 寫入 order_items 表
            const itemRecords = orderItems.map(item => ({
                order_id: newOrderId,
                bento_name: item.bento_name,
                quantity: item.quantity
            }));

            const { error: itemsError } = await supabaseClient
                .from('order_items')
                .insert(itemRecords);

            if (itemsError) throw new Error("寫入 order_items 失敗：" + itemsError.message);

            alert("🎉 預購單提交成功！資料已順利儲存至 Supabase 資料庫。");
            location.reload();

        } catch (err) {
            alert("❌ 錯誤訊息：" + err.message);
            submitBtn.disabled = false;
            submitBtn.innerText = "確認提交預購單";
        }
    });
</script>
</body>
</html>
